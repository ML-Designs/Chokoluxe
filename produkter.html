<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produkter – ChokoLuxe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <a href="index.html" class="logo">ChokoLuxe</a>
      </div>

      <nav class="nav" id="nav-menu">
        <a href="produkter.html">Produkter</a>
        <a href="om.html">Om os</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>

      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>
    <section class="produkt-sektion">
      <h1>Byg din egen chokolade</h1>

      <div class="produkt-gruppe">
        <h2>Vælg chokolade</h2>
        <div class="produkt-grid">
          <div class="produkt-kort">
            <div class="slideshow">
              <img src="hvid choko.png" class="slide aktiv" alt="" />
              <img src="chokocard2.png" class="slide" alt="" />
              <button class="prev">&#10094;</button>
              <button class="next">&#10095;</button>
            </div>
            <p>Hvid chokolade</p>
            <button class="knapvælg">Vælg</button>
          </div>

          <div class="produkt-kort">
            <div class="slideshow">
              <img src="mælkechoko.png" class="slide aktiv" alt="" />
              <img src="chokocard3.png" class="slide" alt="" />
              <button class="prev">&#10094;</button>
              <button class="next">&#10095;</button>
            </div>
            <p>Mælkechokolade</p>
            <button class="knapvælg">Vælg</button>
          </div>

          <div class="produkt-kort">
            <div class="slideshow">
              <img src="mørkchoko.png" class="slide aktiv" alt="" />
              <img src="chokocard1.png" class="slide" alt="" />
              <button class="prev">&#10094;</button>
              <button class="next">&#10095;</button>
            </div>
            <p>Mørk chokolade</p>
            <button class="knapvælg">Vælg</button>
          </div>
        </div>
      </div>

      <div class="produkt-gruppe">
        <h2>Vælg fyld</h2>
        <div class="produkt-grid">
          <div class="produkt-kort">
            <div class="slideshow">
              <img src="mint.png" class="slide aktiv" alt="" />
              <img src="mint2.png" class="slide aktiv" alt="" />
              <button class="prev">&#10094;</button>
              <button class="next">&#10095;</button>
            </div>
            <p>Mint</p>
            <button class="knapvælg">Vælg</button>
          </div>

          <div class="produkt-kort">
            <div class="slideshow">
              <img src="pistache2.png" class="slide aktiv" alt="" />
              <img src="pistache1.png" class="slide aktiv" alt="" />

              <button class="next">&#10095;</button>

            </div>
            <p>Caramel</p>
            <button class="knapvælg">Vælg</button>
          </div>
        </div>
      </div>

      <div class="produkt-gruppe">
        <h2>Vælg topping</h2>
        <div class="produkt-grid">
          <div class="produkt-kort">
            <div class="slideshow">
              <img src="guldstøv.jpg" class="slide aktiv" alt="" />
            </div>
            <p>Guldstøv</p>
            <button class="knapvælg">Vælg</button>
          </div>

          <div class="produkt-kort">
            <div class="slideshow">
              <img src="hindbær.jpg" class="slide aktiv" alt="" />
